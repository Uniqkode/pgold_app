name: pgold_app
description: "PGold Wallet - Transaction Review and Report Flow"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  mobx: ^2.6.0
  flutter_mobx: ^2.3.0
  go_router: ^17.3.0
  intl: ^0.20.3
  shared_preferences: ^2.5.5
  flutter_native_splash: ^2.4.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mobx_codegen: ^2.7.1
  build_runner: ^2.4.14
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/

flutter_native_splash:
  color: "#1A237E"
  image: assets/images/pgold.png
  android: true
  ios: true
  android_12:
    color: "#1A237E"
    image: assets/images/pgold.png
